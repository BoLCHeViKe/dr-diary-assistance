<div class="container-fluid py-4 dashboard">
  <p class="greeting mb-3">{{ saludo }}</p>

  <div class="row g-0">

    <!-- ── Accesos directos ─────────────────────────────────── -->
    <div class="col-12 col-lg-5 pe-lg-4 mb-4 mb-lg-0 dashboard__left">
      <p class="dashboard__title">Accesos directos:</p>

      <div class="d-flex flex-column gap-3 align-items-center">

        <a routerLink="/agenda"
           class="btn btn-primary btn-action text-white text-decoration-none">
          <i class="bi bi-calendar3"></i>

        <a routerLink="/pacientes"

        <a routerLink="/facturacion"
           class="btn btn-action text-white text-decoration-none"

        </a>

      </div>
    </div>

    <!-- ── Estadísticas ─────────────────────────────────────── -->
    <div class="col-12 col-lg-7 ps-lg-4">
      <p class="dashboard__stats-title">Estadísticas:</p>

      <!-- Placeholder — se implementará en próximos sprints -->

           style="min-height:200px; border:2px dashed #d1dae4; border-radius:.75rem; color:#90a0b7;">
        <div class="text-center">
          <i class="bi bi-bar-chart-line" style="font-size:2.5rem; opacity:.4;"></i>
          <p class="mt-2 mb-0 small fw-semibold" style="opacity:.6;">Próximamente</p>
        </div>
