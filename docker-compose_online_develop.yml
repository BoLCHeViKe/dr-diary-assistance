services:

  mariadb:
    image: mariadb:11
    container_name: dda_mariadb
    restart: unless-stopped
    networks:
      dmz_sucia_net:
        ipv4_address: 10.10.10.10
    dns:
      - 1.1.1.1
      - 1.0.0.1
    environment:
      MARIADB_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
      MARIADB_DATABASE: "${DB_DATABASE}"
      MARIADB_USER: "${DB_USERNAME}"
      MARIADB_PASSWORD: "${DB_PASSWORD}"
    ports:
      - "${MARIADB_PORT:-3306}:3306"
    volumes:
      - dda_mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: dda_backend
    restart: unless-stopped
    networks:
      dmz_sucia_net:
        ipv4_address: 10.10.10.11
    dns:
      - 1.1.1.1
      - 1.0.0.1
    env_file:
      - .env
    environment:
      COMPOSER_ALLOW_SUPERUSER: "1"
      APP_NAME: "${APP_NAME}"
      APP_ENV: "${APP_ENV}"
      APP_KEY: "${APP_KEY}"
      APP_DEBUG: "${APP_DEBUG}"
      APP_URL: "${APP_URL}"
      DB_CONNECTION: mysql
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_DATABASE: "${DB_DATABASE}"
      DB_USERNAME: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      mariadb:
        condition: service_healthy
    command: >
      sh -c "composer install --no-interaction --prefer-dist --no-progress
      && php artisan config:clear
      && php artisan migrate --force
      && php artisan serve --host=0.0.0.0 --port=8000"

  frontend:
    build: ./frontend
    container_name: dda_frontend
    restart: unless-stopped
    networks:
      dmz_sucia_net:
        ipv4_address: 10.10.10.12
    dns:
      - 1.1.1.1
      - 1.0.0.1
    environment:
      NODE_ENV: development
    ports:
      - "${FRONTEND_PORT:-4200}:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  dda_mariadb_data:
networks:
  dmz_sucia_net:
    external: true
    name: dmz_sucia_net